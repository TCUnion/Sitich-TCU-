            <h1>TCU CHALLENGE — 台灣自行車計時挑戰社群平台</h1>
            <p>TCU CHALLENGE 是由 TCU（Taiwan Cyclist United）台灣單車聯盟營運的自行車計時挑戰平台。連結 Strava 帳號即可報名路段挑戰，與全台車友競技並查看即時排行榜。</p>

            <h2>平台功能</h2>
            <ul>
              <li><strong>挑戰賽瀏覽與報名</strong>：瀏覽近期 Strava 路段計時挑戰，以 Strava 帳號一鍵報名</li>
              <li><strong>即時排行榜</strong>：查看各路段挑戰成績排名，與全台車友較勁</li>
              <li><strong>個人成績追蹤</strong>：記錄歷次挑戰成績、最佳時間與名次</li>
              <li><strong>車友社群</strong>：與全台車隊、車友互動競技</li>
              <li><strong>TCU 會員綁定</strong>：綁定 TCU 車隊會籍，解鎖技能雷達圖與進階個人數據</li>
            </ul>

            <h2>賽事類型</h2>
            <ul>
              <li>公路登山計時挑戰（爬坡路段）</li>
              <li>公路平路繞圈計時</li>
              <li>隊伍團體挑戰賽</li>
            </ul>

            <h2>如何開始</h2>
            <p>TCU CHALLENGE 平台完全免費。您只需要一個 <a href="https://www.strava.com" target="_blank" rel="noopener">Strava 帳號</a>即可報名所有公開挑戰賽事。登入後在首頁瀏覽進行中的挑戰，點擊「報名」即可參加。完成 Strava 路段騎乘後，成績會自動同步至排行榜。</p>

            <h2>成績計算</h2>
            <p>成績來自 Strava 路段計時資料（Segment Effort）。系統自動抓取您在指定路段的騎乘時間，依完成時間排序產生排行榜。挑戰期間內的最佳成績會被記錄。</p>

            <h2>關於 TCU</h2>
            <p>TCU（Taiwan Cyclist United）台灣單車聯盟成立於 2020 年，致力於推廣台灣自行車競技運動，舉辦各類計時賽事，提供訓練資源與約騎規劃服務。</p>
